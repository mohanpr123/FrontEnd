<mat-toolbar color="primary">
  <span class="title">
    <mat-icon>store</mat-icon> Inventory Management System
  </span>
  <span class="spacer"></span>

  <nav *ngIf="!isLoggedIn && !isProductsRoute">
    <button mat-button routerLink="/login">
      <mat-icon>login</mat-icon> LOGIN
    </button>
    <button mat-button routerLink="/register">
      <mat-icon>person_add</mat-icon> REGISTER
    </button>
  </nav>

  <button mat-button (click)="logout()" *ngIf="isLoggedIn && isProductsRoute">
    <mat-icon>logout</mat-icon> LOGOUT
  </button>
</mat-toolbar>

<router-outlet></router-outlet>
