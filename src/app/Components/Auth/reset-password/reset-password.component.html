<div class="reset-password-container">
  <h2>Reset Password</h2>
  <form [formGroup]="resetForm" (ngSubmit)="OnReset()" class="reset-password-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="Enter your email" />
      <mat-error *ngIf="resetForm.get('email')?.hasError('required') && resetForm.get('email')?.touched">
        Email is required.
      </mat-error>
      <mat-error *ngIf="resetForm.get('email')?.hasError('email') && resetForm.get('email')?.touched">
        Invalid email format.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput formControlName="Password" type="password" placeholder="Enter new password" />
      <mat-error *ngIf="resetForm.get('Password')?.hasError('required') && resetForm.get('Password')?.touched">
        New password is required.
      </mat-error>
      <mat-error *ngIf="resetForm.get('Password')?.hasError('minlength') && resetForm.get('Password')?.touched">
        Password must be at least 6 characters long.
      </mat-error>
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="resetForm.invalid">
      Reset Password
    </button>
    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </form>
</div>
