<div class="register-container">
  <h2>Register</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="register-form">
    <!-- Username -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" required  title="username"/>
      <mat-error *ngIf="registerForm.get('username')?.hasError('required') && registerForm.get('username')?.touched">
        Username is required.
      </mat-error>
      <mat-error *ngIf="registerForm.get('username')?.hasError('minlength') && registerForm.get('username')?.touched">
        Username must be at least 3 characters long.
      </mat-error>
    </mat-form-field>

    <!-- Email -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="Enter your email" />
      <mat-error *ngIf="registerForm.get('email')?.hasError('required') && registerForm.get('email')?.touched">
        Email is required.
      </mat-error>
      <mat-error *ngIf="registerForm.get('email')?.hasError('pattern') && registerForm.get('email')?.touched">
        Invalid email format.
      </mat-error>
    </mat-form-field>

    <!-- Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password" placeholder="Enter your password" />
      <mat-error *ngIf="registerForm.get('password')?.hasError('required') && registerForm.get('password')?.touched">
        Password is required.
      </mat-error>
      <mat-error *ngIf="registerForm.get('password')?.hasError('pattern') && registerForm.get('password')?.touched">
        Password must be at least 6 characters, include letters and numbers.
      </mat-error>
    </mat-form-field>

    <!-- Confirm Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <input matInput formControlName="confirmpassword" type="password" placeholder="Confirm your password" />
      <mat-error *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmpassword')?.touched">
        Passwords do not match.
      </mat-error>
    </mat-form-field>

    <!-- Register Button -->
    <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="!registerForm.valid">
      Register
    </button>
    <div class="finalMessage">
      <span *ngIf="message">
        {{ message }}
        <span mat-button routerLink="/login">Login</span>
      </span>
    </div>
  </form>
</div>
