<h2 mat-dialog-title>Confirm Delete</h2>
<mat-dialog-content
  >Are you sure you want to delete this product?</mat-dialog-content
>
<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">No</button>
  <button mat-button color="warn" (click)="onYesClick()" cdkFocusInitial>
    Yes
  </button>
</mat-dialog-actions>
