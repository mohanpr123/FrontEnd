<mat-toolbar color="primary">
  <span>Fashion Products</span>
</mat-toolbar>

@if(loading){
<div class="loading-container">
  <mat-spinner></mat-spinner>
</div>
}

<cdk-virtual-scroll-viewport itemSize="80" class="scroll-viewport" (scrolledIndexChange)="onScroll($event)">
  <div  class="product-grid">
    <mat-card *cdkVirtualFor="let product of products" class="product-card">
      <mat-card-header>
        <mat-card-title>{{product.productid}}.{{ product.productname }}</mat-card-title>
        <mat-card-subtitle>{{ product.brand }} - {{ product.category }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p><strong>Color:</strong> {{ product.colour }}</p>
        <p><strong>Size:</strong> {{ product.size }}</p>
        <p><strong>Price:</strong> ${{ product.price }}</p>
        <p><strong>Rating:</strong> ⭐ {{ product.rating }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</cdk-virtual-scroll-viewport>
